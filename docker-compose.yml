version: '3.9'

services:
  # MongoDB
  mongo:
    image: mongo:7-jammy
    container_name: jobbuddy_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: jobbuddy
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # JobBuddy AI App
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobbuddy_app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      PORT: 8080
      MONGO_URI: mongodb://mongo:27017
      DB_NAME: jobbuddy
      JWT_SECRET: ${JWT_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8080}
      LOG_LEVEL: info
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - app_logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  mongo_data:
  app_logs:
