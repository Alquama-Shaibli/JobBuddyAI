name: CI — Install, Lint & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: Install & Verify ─────────────────────────────
  backend:
    name: Backend — Install & Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Verify server starts
        run: |
          cp .env.example .env
          timeout 10 node index.js || true
        env:
          NODE_ENV: test
          PORT: 8081
          MONGO_URI: mongodb://localhost:27017
          DB_NAME: jobbuddy_test
          JWT_SECRET: ci_test_secret_key_that_is_long_enough
          GEMINI_API_KEY: test_key

  # ── Frontend: Install, Build ─────────────────────────────
  frontend:
    name: Frontend — Install & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: /api/v1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: client/dist
          retention-days: 7

  # ── Docker: Build Image ───────────────────────────────────
  docker:
    name: Docker — Build Image
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t jobbuddy-ai:${{ github.sha }} .

      - name: Test health check
        run: |
          docker run -d --name test_app \
            -e NODE_ENV=test \
            -e PORT=8080 \
            -e JWT_SECRET=test_secret_for_ci \
            -e MONGO_URI=mongodb://host.docker.internal:27017 \
            -e DB_NAME=test \
            -p 8080:8080 \
            jobbuddy-ai:${{ github.sha }}
          sleep 10
          docker logs test_app
          docker stop test_app
